services:
  - type: web
    name: antigravity-hustle-engine
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Your Google Gemini API Key (get from https://aistudio.google.com/app/apikeys)"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
        placeholder: "Your Gmail address (e.g., sender@gmail.com)"
      - key: SMTP_PASS
        sync: false
        placeholder: "Gmail App Password (NOT your regular password - generate at myaccount.google.com/apppasswords)"
      - key: ADMIN_EMAIL
        sync: false
        placeholder: "Admin email to receive daily reports and error alerts"
      - key: PS_LINK
        value: "https://jacksplugreviews.com"
