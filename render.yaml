# render.yaml
# Render Blueprint Specification for One-Click Template Deployment
# Learn more at https://render.com/docs/blueprints

services:
  - type: web
    name: master-hustle-engine
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Your Google Gemini API Key"
      
      # SMTP Email Configuration
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
        placeholder: "sender@gmail.com"
      - key: SMTP_PASS
        sync: false
        placeholder: "Gmail App Password"
      
      # Admin Notification Email
      - key: ADMIN_EMAIL
        sync: false
        placeholder: "admin@domain.com"
      
      # Bottom Promo Link
      - key: PS_LINK
        value: https://jacksplugreviews.com

      # Stripe Payment Integration
      - key: STRIPE_SECRET_KEY
        sync: false
        placeholder: "sk_live_..."
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
        placeholder: "whsec_..."

    # Uncomment this block to add a persistent disk (requires Render paid tier)
    # disk:
    #   name: database-storage
    #   mountPath: /opt/render/project/src/data
    #   sizeGB: 1

  # ── Python FastAPI Orchestrator ────────────────────────────────────────────
  - type: web
    name: antigravity-orchestrator
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn orchestrator:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Your Google Gemini API Key"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
        placeholder: "sender@gmail.com"
      - key: SMTP_PASS
        sync: false
        placeholder: "Gmail App Password"
      - key: ADMIN_EMAIL
        sync: false
        placeholder: "admin@domain.com"
      - key: OPENPHONE_API_KEY
        sync: false
        placeholder: "Your OpenPhone API Key"
      - key: OPENPHONE_FROM_NUMBER
        sync: false
        placeholder: "+1XXXXXXXXXX"
      - key: DB_PATH
        value: /opt/render/project/src/orchestrator_audit.sqlite
